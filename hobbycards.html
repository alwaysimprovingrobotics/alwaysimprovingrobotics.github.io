		function list_gallery() {
			var str = '';
			for(var i=0; i<items.length-1; i++) {
				if(items[i][0].substr(0, 1) == '@') {
					if(str != '')
						str += '<div style="height:20px;"></div>';
					str += '<div class="title">' + items[i][0].substr(1) + '</div>';
					str += '<div style="border-top:solid 2px #35bbfc;height:8px;font-size:0;"></div>';
				}
				else {
					str += '<div class="thumbnail" style="background:url(\'hobbycards/' + items[i][1] + '\') no-repeat -' +
					items[i][4] + ' -' + items[i][5] + 'px;background-size:' + parseInt(128 * items[i][2] / items[i][6]) + 'px;" \
					onClick="show_info(' + i + ')"></div>';
				}
			}
			$('gallery').innerHTML = str;
		}

		function show_info(i) {
			alert(items[i][7]);
		}

		print_header("hobbycard");
