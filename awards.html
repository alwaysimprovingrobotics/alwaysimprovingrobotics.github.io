<html xmlns="http://www.w3.org/1999/xhtml">
<head>
	<meta name="viewport" content="width=device-width; initial-scale=1; minimum-scale=1, maximum-scale=1; user-scalable=0;"/>
	<meta http-equiv=Content-Type content="text/html; charset=utf-8">
	<link rel="apple-touch-icon-precomposed" sizes="114x114" href="img/icon114.png">
	<link rel="apple-touch-icon-precomposed" sizes="57x57" href="img/icon57.png">
	<link rel="shortcut icon" href="img/icon57.png">
	<link rel="stylesheet" type="text/css" href="css/main.css" />
	<title>Always Improving - Awards</title>
	<style>
		.box span {
			display: inline-block;
			color: #2c1d80;
			font-weight: bold;
			margin: 0 10px 16px 0;
		}

		.swiper-slide {background-size: cover;background-position: center;width: 100%;height: 100%;}
		.slide_page {position: absolute;background: #fff;border-radius: 15px 15px 5px 5px;box-shadow: 2px 2px 5px rgba(0,0,0,0.5);margin: "+cfg.margin+"px;width: "+cfg.width+"px;height: "+cfg.height+"px;}
		.slide_title {text-align: center;letter-spacing: 6px;text-shadow: 2px 2px 5px rgba(0,0,0,0.75);color: #ffffff;font-size: " + cfg.titleFontSize + "px;line-height: " + cfg.titleHeight + "px;}
		.slide_content {width: 100%;height: auto;background: #fff;position: absolute;top: " + cfg.titleHeight + "px;bottom: " + cfg.footerHeight + "px;}
		.slide_footer {width: 100%;text-align: center;position: absolute;bottom: 40px;}
		.slide_content_left, .slide_content_right {width: 50%;position: absolute;padding: 0.5em 0 0 1em;}
		.slide_content_right {right: -0.5em;}
	</style>
	<script src="js/main.js"></script>
</head>
<body>
	<div id="header"></div>
	<div id="navi"></div>

	<div id="frame">
		<div class="box">
			<div class="title">2022-2023 Superpowered</div>
			<div style="text-align: center;">
				<span>
					<img src="awards/2022_01.jpg" width="256" height="320">
					<br>
					BSU Qualifier
					<br>
					Robot Performance Award (1st Place)
				</span>
				<span>
					<img src="awards/2022_02.jpg" width="256" height="320">
					<br>
					Maryland Championship
					<br>
					Robot Design Award (Finalist)
				</span>
				<span>
					<img src="awards/2022_03.jpg" width="256" height="320">
					<br>
					Maryland Championship
					<br>
					Robot Performance Award (3rd Place)
				</span>
			</div>
		</div>
	</div>

	<script lang="javascript">
		print_header("awards");
	</script>
</body>
</html>
